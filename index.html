<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="OwnerAway provides temporary operational coverage so entertainment venue owners can step away with confidence. You take off. We take over." />
    <title>OwnerAway — You Take Off. We Take Over.</title>
    <!-- Set the theme before paint to avoid a flash of the wrong colors -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("oa-theme");
          var prefersDark = window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = saved || (prefersDark ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
